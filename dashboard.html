<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Person Company - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            align-items: start;
            gap: 20px;
            min-height: 100svh;
            padding: 20px;
            margin: 0;
        }

        #office-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            border: 10px solid #fff;
            border-radius: 0;
            overflow: hidden;
            margin: 0 auto;
        }

        #office-stage {
            position: relative;
            width: 100%;
        }

        #office-map {
            display: block;
            width: 100%;
            height: auto;
        }

        .agent {
            position: absolute;
            width: clamp(36px, 5.5vw, 68px);
            height: clamp(36px, 5.5vw, 68px);
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transform: translate(-50%, -50%);
        }

        .agent img {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .agent:hover {
            transform: translate(-50%, -50%) scale(1.15);
            z-index: 100;
        }

        .agent-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            font-weight: bold;
        }

        .agent.working {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        #sidebar {
            position: sticky;
            top: 20px;
            width: 100%;
            height: calc(100svh - 40px);
            background: #0a0a0a;
            padding: 30px 20px;
            border-left: 1px solid #333;
            overflow-y: auto;
        }

        h1 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .agent-info {
            background: transparent;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 0;
            border: 1px solid #333;
        }

        .agent-name {
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
            font-size: 14px;
        }

        .agent-status {
            font-size: 13px;
            color: #fff;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 0;
            font-size: 11px;
            margin-right: 8px;
            font-weight: bold;
            color: #fff;
            border: 1px solid #fff;
        }

        #controls {
            display: none; /* Hidden for now */
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 12px;
        }

        #controls button {
            background: #000;
            border: 1px solid #000;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            margin-right: 5px;
        }

        #controls button:hover {
            background: #333;
        }

        #position-output {
            margin-top: 10px;
            font-size: 11px;
            color: #000;
        }

        @media (max-width: 900px) {
            body {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 12px;
            }

            #office-container {
                border-width: 6px;
            }

            #sidebar {
                position: static;
                height: auto;
                border-left: 0;
                border-top: 1px solid #333;
                padding: 20px 12px;
            }

            h1 {
                margin-bottom: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="office-container">
        <div id="office-stage">
            <img id="office-map" src="assets/custom_made/map.png" alt="Office Map">
            <!-- Agents will be added here dynamically -->
        </div>
    </div>

    <div id="sidebar">
        <h1>Dashboard</h1>
        <div id="agents-list">
            <!-- Agent cards will be added here -->
        </div>
    </div>

    <div id="controls">
        <strong>Position Mode:</strong><br>
        <button onclick="togglePositionMode(event)">Toggle Edit Mode</button>
        <button onclick="showPositions()">Show Positions</button>
        <div id="position-output"></div>
    </div>

    <script src="dashboard.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Set these in a small script tag before this file in production if needed.
        const SUPABASE_URL = window.SUPABASE_URL || "";
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "";
        const supabaseClient = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;

        const AGENT_BASE = {
            strategist_lead: {
                name: "Thea",
                role: "Strategist",
                color: "#4ECDC4",
                image: "assets/custom_made/1.png"
            },
            creator_lead: {
                name: "Kavi",
                role: "Creator",
                color: "#4ECDC4",
                image: "assets/custom_made/6.png"
            },
            analyst_lead: {
                name: "Dara",
                role: "Analyst",
                color: "#95E1D3",
                image: "assets/custom_made/10.png"
            }
        };

        // Map DB current_location -> coordinates (% of map size).
        // Watercooler has its own zone, all other meetings use meeting_room.
        const LOCATION_POSITIONS = {
            desk: {
                strategist_lead: { x: 30, y: 16 },
                creator_lead: { x: 50.5, y: 16 },
                analyst_lead: { x: 40.5, y: 16 }
            },
            lounge: {
                strategist_lead: { x: 79, y: 6 },
                creator_lead: { x: 84.5, y: 6 },
                analyst_lead: { x: 90, y: 2 }
            },
            meeting_room: {
                strategist_lead: { x: 65, y: 75 },
                creator_lead: { x: 75, y: 75 },
                analyst_lead: { x: 70, y: 85 }
            },
            watercooler_zone: {
                strategist_lead: { x: 17, y: 59 },
                creator_lead: { x: 10, y: 55 },
                analyst_lead: { x: 18, y: 70 }
            },
            one_on_one_room: {
                strategist_lead: { x: 30, y: 16 },
                creator_lead: { x: 50.5, y: 16 },
                analyst_lead: { x: 40.5, y: 16 }
            }
        };

        let agents = Object.fromEntries(
            Object.entries(AGENT_BASE).map(([id, base]) => {
                const initialPos = LOCATION_POSITIONS.meeting_room[id] || { x: 40, y: 40 };
                return [
                    id,
                    {
                        ...base,
                        x: initialPos.x,
                        y: initialPos.y,
                        state: "meeting",
                        current_location: "meeting_room",
                        task: null
                    }
                ];
            })
        );

        let positionMode = false;
        let selectedAgent = null;

        function inferLocationFromState(state) {
            if (!state) return null;
            const normalized = state.toLowerCase();
            if (normalized.startsWith("in_watercooler")) return "watercooler_zone";
            if (normalized.startsWith("in_one_on_one")) return "one_on_one_room";
            if (normalized.startsWith("in_")) return "meeting_room";
            if (normalized.startsWith("working_")) return "desk";
            if (normalized === "idle") return "lounge";
            return null;
        }

        function resolveAgentPosition(agentId, dbAgent) {
            const locationFromState = inferLocationFromState(dbAgent.state);
            const location = dbAgent.current_location || locationFromState || "lounge";
            const locationMap = LOCATION_POSITIONS[location] || LOCATION_POSITIONS.lounge;
            return locationMap[agentId] || LOCATION_POSITIONS.lounge[agentId] || { x: 40, y: 40 };
        }

        function createAgentElement(id, agent) {
            const agentDiv = document.createElement("div");
            const isWorking = typeof agent.state === "string" && agent.state.startsWith("working_");
            agentDiv.className = `agent ${agent.state}${isWorking ? " working" : ""}`;
            agentDiv.id = `agent-${id}`;
            agentDiv.style.left = `${agent.x}%`;
            agentDiv.style.top = `${agent.y}%`;

            const img = document.createElement("img");
            img.src = agent.image;
            img.alt = agent.name;
            agentDiv.appendChild(img);

            const label = document.createElement("div");
            label.className = "agent-label";
            label.textContent = agent.name;
            agentDiv.appendChild(label);

            agentDiv.addEventListener("click", (event) => {
                event.stopPropagation();
                if (positionMode) {
                    selectedAgent = id;
                    console.log(`Selected ${agent.name} for positioning`);
                }
            });

            return agentDiv;
        }

        function renderAgents() {
            const stage = document.getElementById("office-stage");
            stage.querySelectorAll(".agent").forEach((el) => el.remove());

            for (const [id, agent] of Object.entries(agents)) {
                stage.appendChild(createAgentElement(id, agent));
            }

            updateSidebar();
        }

        function updateSidebar() {
            const list = document.getElementById("agents-list");
            list.innerHTML = "";

            for (const agent of Object.values(agents)) {
                const card = document.createElement("div");
                card.className = "agent-info";
                card.style.borderColor = agent.color;

                const statusClass = `status-${agent.state}`;
                const statusText = agent.state.charAt(0).toUpperCase() + agent.state.slice(1);

                card.innerHTML = `
                    <div class="agent-name">
                        ${agent.name}
                        <span style="color: #fff; font-size: 12px; font-weight: normal;">(${agent.role})</span>
                    </div>
                    <div class="agent-status">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        ${agent.task || "Free"}
                        <div style="margin-top: 6px; font-size: 11px; opacity: 0.8;">📍 ${agent.current_location || "unknown"}</div>
                    </div>
                `;

                list.appendChild(card);
            }
        }

        function togglePositionMode(event) {
            positionMode = !positionMode;
            const btn = event.target;
            btn.textContent = positionMode ? "✅ Edit Mode ON" : "Toggle Edit Mode";
            btn.style.background = positionMode ? "#f39c12" : "#4ECDC4";

            document.getElementById("position-output").innerHTML =
                positionMode ? "Click map to move selected agent. Click agent first to select." : "";
        }

        function showPositions() {
            let output = "<strong>Current Positions:</strong><br>";
            for (const agent of Object.values(agents)) {
                output += `${agent.name}: x: ${agent.x}%, y: ${agent.y}%<br>`;
            }
            document.getElementById("position-output").innerHTML = output;
        }

        document.getElementById("office-stage").addEventListener("click", (e) => {
            if (!positionMode || !selectedAgent) return;

            const rect = e.currentTarget.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
            const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);

            agents[selectedAgent].x = parseFloat(x);
            agents[selectedAgent].y = parseFloat(y);

            renderAgents();
            console.log(`Moved ${agents[selectedAgent].name} to x: ${x}%, y: ${y}%`);
            showPositions();
        });

        async function fetchAgents() {
            if (!supabaseClient) {
                console.log("Supabase client not configured. Using local fallback state.");
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from("agents")
                    .select("id,state,current_location,pixel_position");

                if (error) {
                    console.error("Failed to fetch agents from Supabase:", error.message);
                    return;
                }

                for (const dbAgent of data || []) {
                    const id = dbAgent.id;
                    if (!agents[id]) continue;

                    const pos = resolveAgentPosition(id, dbAgent);
                    agents[id] = {
                        ...agents[id],
                        ...dbAgent,
                        x: pos.x,
                        y: pos.y,
                        current_location: dbAgent.current_location || agents[id].current_location
                    };
                }
                renderAgents();
            } catch (error) {
                console.log("Using local fallback state (Supabase unavailable)");
            }
        }

        renderAgents();
        fetchAgents();
        setInterval(fetchAgents, 5000);

        console.log("Dashboard loaded");
        console.log("Position from DB current_location -> map coordinates is active");
    </script>
</body>
</html>
