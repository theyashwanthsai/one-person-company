<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Person Company - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            padding-right: 320px;
            margin: 0;
        }

        #office-container {
            position: relative;
            display: inline-block;
            border: 10px solid #fff;
            border-radius: 0;
            overflow: hidden;
            margin-left: 20px;
        }

        #office-map {
            display: block;
            width: 1200px;
            height: auto;
        }

        .agent {
            position: absolute;
            width: 68px;
            height: 68px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .agent img {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .agent:hover {
            transform: scale(1.2);
            z-index: 100;
        }

        .agent-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            font-weight: bold;
        }

        .agent.working {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        #sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: #0a0a0a;
            padding: 30px 20px;
            border-left: 1px solid #333;
            overflow-y: auto;
        }

        h1 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .agent-info {
            background: transparent;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 0;
            border: 1px solid #333;
        }

        .agent-name {
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
            font-size: 14px;
        }

        .agent-status {
            font-size: 13px;
            color: #fff;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 0;
            font-size: 11px;
            margin-right: 8px;
            font-weight: bold;
            color: #fff;
            border: 1px solid #fff;
        }

        #controls {
            display: none; /* Hidden for now */
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 12px;
        }

        #controls button {
            background: #000;
            border: 1px solid #000;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            margin-right: 5px;
        }

        #controls button:hover {
            background: #333;
        }

        #position-output {
            margin-top: 10px;
            font-size: 11px;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="office-container">
        <img id="office-map" src="assets/custom_made/map.png" alt="Office Map">
        
        <!-- Agents will be added here dynamically -->
    </div>

    <div id="sidebar">
        <h1>Dashboard</h1>
        <div id="agents-list">
            <!-- Agent cards will be added here -->
        </div>
    </div>

    <div id="controls">
        <strong>Position Mode:</strong><br>
        <button onclick="togglePositionMode()">Toggle Edit Mode</button>
        <button onclick="showPositions()">Show Positions</button>
        <div id="position-output"></div>
    </div>

    <script>
        // Agent data - adjust x/y positions here (percentages of map size)
        let agents = {
            strategist_lead: {
                name: "Thea",
                role: "Strategist",
                color: "#4ECDC4",
                image: "assets/custom_made/1.png",
                x: 30,  // % from left
                y: 16,  // % from top
                state: "idle",
                task: null
            },
            creator_lead: {
                name: "Kavi",
                role: "Creator",
                color: "#4ECDC4",
                image: "assets/custom_made/6.png",
                x: 50.5,
                y: 16,
                state: "idle",
                task: null
            },
            analyst_lead: {
                name: "Dara",
                role: "Analyst",
                color: "#95E1D3",
                image: "assets/custom_made/10.png",
                x: 67.5,
                y: 7,
                state: "idle",
                task: null
            }
        };

        let positionMode = false;
        let selectedAgent = null;

        function createAgentElement(id, agent) {
            const agentDiv = document.createElement('div');
            agentDiv.className = `agent ${agent.state}`;
            agentDiv.id = `agent-${id}`;
            agentDiv.style.left = `${agent.x}%`;
            agentDiv.style.top = `${agent.y}%`;
            
            // Add agent image
            const img = document.createElement('img');
            img.src = agent.image;
            img.alt = agent.name;
            agentDiv.appendChild(img);
            
            const label = document.createElement('div');
            label.className = 'agent-label';
            label.textContent = agent.name;
            agentDiv.appendChild(label);
            
            // Click handler for position mode
            agentDiv.addEventListener('click', (e) => {
                if (positionMode) {
                    selectedAgent = id;
                    console.log(`Selected ${agent.name} for positioning`);
                }
            });
            
            return agentDiv;
        }

        function renderAgents() {
            const container = document.getElementById('office-container');
            
            // Remove old agents
            container.querySelectorAll('.agent').forEach(el => el.remove());
            
            // Add agents
            for (const [id, agent] of Object.entries(agents)) {
                container.appendChild(createAgentElement(id, agent));
            }
            
            // Update sidebar
            updateSidebar();
        }

        function updateSidebar() {
            const list = document.getElementById('agents-list');
            list.innerHTML = '';
            
            for (const [id, agent] of Object.entries(agents)) {
                const card = document.createElement('div');
                card.className = 'agent-info';
                card.style.borderColor = agent.color;
                
                const statusClass = `status-${agent.state}`;
                const statusText = agent.state.charAt(0).toUpperCase() + agent.state.slice(1);
                
                card.innerHTML = `
                    <div class="agent-name">
                        ${agent.name}
                        <span style="color: #fff; font-size: 12px; font-weight: normal;">(${agent.role})</span>
                    </div>
                    <div class="agent-status">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        ${agent.task || 'Free'}
                    </div>
                `;
                
                list.appendChild(card);
            }
        }

        function togglePositionMode() {
            positionMode = !positionMode;
            const btn = event.target;
            btn.textContent = positionMode ? '✅ Edit Mode ON' : 'Toggle Edit Mode';
            btn.style.background = positionMode ? '#f39c12' : '#4ECDC4';
            
            document.getElementById('position-output').innerHTML = 
                positionMode ? 'Click map to move selected agent. Click agent first to select.' : '';
        }

        function showPositions() {
            let output = '<strong>Current Positions:</strong><br>';
            for (const [id, agent] of Object.entries(agents)) {
                output += `${agent.name}: x: ${agent.x}%, y: ${agent.y}%<br>`;
            }
            document.getElementById('position-output').innerHTML = output;
        }

        // Click on map to position agent
        document.getElementById('office-container').addEventListener('click', (e) => {
            if (!positionMode || !selectedAgent) return;
            
            const rect = e.currentTarget.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
            const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
            
            agents[selectedAgent].x = parseFloat(x);
            agents[selectedAgent].y = parseFloat(y);
            
            renderAgents();
            
            console.log(`Moved ${agents[selectedAgent].name} to x: ${x}%, y: ${y}%`);
            showPositions();
        });

        // Fetch agents from API (optional - falls back to mock data)
        async function fetchAgents() {
            try {
                const response = await fetch('/api/agents');
                if (response.ok) {
                    const data = await response.json();
                    // Merge with existing positions
                    for (const [id, agent] of Object.entries(data)) {
                        if (agents[id]) {
                            agents[id] = { ...agents[id], ...agent };
                        }
                    }
                    renderAgents();
                }
            } catch (error) {
                console.log('Using mock data');
            }
        }

        // Initialize
        renderAgents();
        
        // Auto-refresh every 5 seconds (optional)
        // setInterval(fetchAgents, 5000);
        
        console.log('🏝️ Dashboard loaded!');
        console.log('To adjust positions: click "Toggle Edit Mode", click an agent, then click where you want to move them');
    </script>
</body>
</html>
